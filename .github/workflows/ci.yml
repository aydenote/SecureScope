name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/SecureScope.Api.csproj

      - name: Build backend
        run: dotnet build backend/SecureScope.Api.csproj --configuration Release --no-restore

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
