name: Deploy Web Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-web-demo
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'securescope-rg' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'securescope-api-ayden' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
  CONTAINER_IMAGE_NAME: securescope-api
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || 'https://secure-scope.vercel.app' }}

jobs:
  deploy-backend:
    name: Deploy backend container to Azure Container Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment variables
        run: |
          : "${AZURE_ACR_NAME:?Set AZURE_ACR_NAME as a GitHub repository variable.}"
          : "${AZURE_ACR_LOGIN_SERVER:?Set AZURE_ACR_LOGIN_SERVER as a GitHub repository variable.}"
          : "${VITE_API_BASE_URL:?Set VITE_API_BASE_URL as a GitHub repository variable.}"
          : "${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN as a GitHub repository variable.}"

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ env.AZURE_ACR_NAME }}"

      - name: Build and push backend image
        run: |
          ACR_LOGIN_SERVER="$(printf '%s' "$AZURE_ACR_LOGIN_SERVER" | tr -d '\r\n')"
          IMAGE="$ACR_LOGIN_SERVER/${CONTAINER_IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            --file backend/Dockerfile \
            --tag "$IMAGE" \
            backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend container
        run: |
          az containerapp update \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_CONTAINER_APP_NAME }}" \
            --image "$IMAGE" \
            --set-env-vars \
              ASPNETCORE_ENVIRONMENT=Production \
              "ConnectionStrings__DefaultConnection=Data Source=/data/securescope.db" \
              "Frontend__AllowedOrigins__0=${{ env.FRONTEND_ORIGIN }}"

      - name: Show backend URL
        run: |
          az containerapp show \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv

  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy frontend
        working-directory: frontend
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
